    <h1>Contacto</h1>
    <form class="formulario">
        <fieldset class="container-contacto">
            <legend>Contacto</legend>
            <label class="l1"or="name">Name</label>
            <input type="text" name="name">

            <label class="l2" for="apellido">Apellido</label>
            <input type="text" name="apellido">

            <label class="l3" for="correo">Email</label>
            <input type="email" name="correo">

            <fieldset class="container-mesaje">
                <legend>Mensaje</legend>
                <textarea name="mensaje" id="mensaje" placeholder="Escribe tu mensaje..." rows="5" cols="70"></textarea>
            </fieldset>
        </fieldset>
        <button>Enviar</button>
    </form>
